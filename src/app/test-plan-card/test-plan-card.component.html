<mat-card *ngIf="testPlanCard" class="example-card" class="example-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>{{ testPlanCard.name }}</mat-card-title>
    <mat-card-subtitle>{{ testPlanCard.cartegorie }}</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image src="https://material.angular.dev/assets/img/examples/shiba2.jpg" alt="Photo of a Shiba Inu">
  <mat-card-content>
    <p>
      {{ testPlanCard.description }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>MODIFY</button>
    <button (click)="onDelete()" matButton>DELETE</button>
    <button matButton>EXECUTE</button>
  </mat-card-actions>
</mat-card>
